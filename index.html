<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Math Curve Loaders</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="page">
      <section class="hero">
        <div class="hero-bar">
          <div class="lang-switch" role="group" aria-label="Language switch">
            <button id="lang-en" class="lang-button is-active" type="button">EN</button>
            <button id="lang-zh" class="lang-button" type="button">中文</button>
          </div>
          <a
            class="repo-link"
            href="https://x.com/xin_pai88825"
            target="_blank"
            rel="noreferrer"
          >
            <svg
              class="repo-link-icon"
              viewBox="0 0 24 24"
              aria-hidden="true"
              fill="currentColor"
            >
              <path
                d="M18.9 2H22l-6.77 7.74L23 22h-6.1l-4.77-6.24L6.67 22H3.56l7.24-8.28L1 2h6.26l4.31 5.7L18.9 2Zm-1.09 18h1.72L6.32 3.9H4.47L17.81 20Z"
              ></path>
            </svg>
            X
          </a>
          <a
            class="repo-link"
            href="https://www.xiaohongshu.com/user/profile/5a2e96aab1da1465364b727b"
            target="_blank"
            rel="noreferrer"
          >
            <svg
              class="repo-link-icon"
              viewBox="0 0 24 24"
              aria-hidden="true"
              fill="none"
              stroke="currentColor"
              stroke-width="1.9"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M6 7.2c2.2-1.8 4.3-2.8 6.3-3.1"></path>
              <path d="M11.4 5.2c.8 2 .9 4.2.1 6.3"></path>
              <path d="M7.4 11.2c2.2-1.1 4.5-1.4 6.8-.9"></path>
              <path d="M5.2 15.6c4.2-1.4 8.7-1 13.6 1.2"></path>
              <path d="M5 18.6h14"></path>
            </svg>
            <span class="repo-link-text">小红书</span>
          </a>
          <a
            class="repo-link"
            href="https://github.com/Paidax01/math-curve-loaders"
            target="_blank"
            rel="noreferrer"
          >
            <svg
              class="repo-link-icon"
              viewBox="0 0 24 24"
              aria-hidden="true"
              fill="currentColor"
            >
              <path
                d="M12 2C6.48 2 2 6.58 2 12.23c0 4.52 2.87 8.36 6.84 9.71.5.1.68-.22.68-.5 0-.24-.01-1.03-.01-1.87-2.78.62-3.37-1.21-3.37-1.21-.46-1.18-1.11-1.5-1.11-1.5-.91-.64.07-.62.07-.62 1 .07 1.53 1.06 1.53 1.06.9 1.58 2.35 1.13 2.92.86.09-.67.35-1.13.63-1.39-2.22-.26-4.55-1.14-4.55-5.07 0-1.12.39-2.03 1.03-2.75-.1-.26-.45-1.31.1-2.73 0 0 .84-.28 2.75 1.05A9.33 9.33 0 0 1 12 6.84c.85 0 1.71.12 2.51.35 1.91-1.33 2.75-1.05 2.75-1.05.55 1.42.2 2.47.1 2.73.64.72 1.03 1.63 1.03 2.75 0 3.94-2.34 4.81-4.57 5.06.36.32.68.95.68 1.92 0 1.39-.01 2.5-.01 2.84 0 .28.18.61.69.5A10.25 10.25 0 0 0 22 12.23C22 6.58 17.52 2 12 2Z"
              ></path>
            </svg>
            GitHub
          </a>
        </div>
        <p id="hero-eyebrow" class="eyebrow">Mathematical Curve Motion</p>
        <h1 id="hero-title">A Gallery of Mathematical Loading Animations</h1>
      </section>

      <section class="category-panel" aria-label="Filter by curve family">
        <div id="category-controls" class="category-controls" role="group" aria-label="Filter by curve family"></div>
        <div class="gallery-window-controls">
          <p id="gallery-status" class="gallery-status" aria-live="polite"></p>
          <div class="gallery-window-actions">
            <button id="load-more" class="category-button" type="button">Load more</button>
            <button id="show-all" class="category-button" type="button">Show all</button>
          </div>
        </div>
      </section>

      <section class="showcase">
        <section id="gallery" class="gallery" aria-label="Mathematical curve animation gallery"></section>
      </section>
    </main>

    <div id="viewer-modal" class="viewer-modal" aria-hidden="true">
      <div id="viewer-backdrop" class="viewer-backdrop"></div>
      <section id="viewer" class="viewer" aria-live="polite" role="dialog" aria-modal="true" aria-labelledby="viewer-title">
        <div class="viewer-preview">
          <div class="viewer-stage">
            <canvas
              id="viewer-canvas"
              class="viewer-canvas"
              aria-hidden="true"
              width="600"
              height="600"
            ></canvas>
            <svg
              id="viewer-svg"
              class="viewer-svg"
              aria-hidden="true"
              viewBox="0 0 100 100"
              fill="none"
            >
              <g id="viewer-group">
                <path
                  id="viewer-path"
                  stroke="currentColor"
                  stroke-width="5"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  opacity="0.1"
                ></path>
              </g>
            </svg>
          </div>
          <div class="viewer-copy">
            <p id="viewer-tag" class="viewer-tag"></p>
            <h2 id="viewer-title" class="viewer-title"></h2>
            <p id="viewer-desc" class="viewer-desc"></p>
            <div class="viewer-controls-block">
              <div class="viewer-section-head">
                <p id="viewer-controls-label" class="viewer-code-label">Controls</p>
                <button id="viewer-reset" class="viewer-reset" type="button">Reset</button>
              </div>
              <div id="viewer-controls" class="viewer-controls"></div>
            </div>
          </div>
        </div>

        <aside class="viewer-code-panel">
          <div class="viewer-code-head">
            <p id="viewer-code-label" class="viewer-code-label">Code</p>
            <div class="viewer-actions">
              <button id="viewer-download" class="viewer-close" type="button">Download HTML</button>
              <button id="viewer-copy" class="viewer-close" type="button">Copy</button>
              <button id="viewer-close" class="viewer-close" type="button">Close</button>
            </div>
          </div>
          <pre id="viewer-code" class="viewer-code"><code></code></pre>
          <div class="viewer-formula-block viewer-formula-panel">
            <p id="viewer-formula-label" class="viewer-code-label">Formula</p>
            <pre id="viewer-formula" class="viewer-formula"></pre>
          </div>
        </aside>
      </section>
    </div>

    <script src="./main.js"></script>
  </body>
</html>
