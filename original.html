<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Original Thinking Indicator</title>
    <link rel="stylesheet" href="./original.css" />
  </head>
  <body>
    <main class="page">
      <svg
        id="thinking-indicator"
        aria-hidden="true"
        viewBox="0 0 100 100"
        width="132"
        height="132"
        fill="none"
      >
        <g id="rotating-group">
          <path
            id="background-path"
            stroke="currentColor"
            stroke-width="5.5"
            stroke-linecap="round"
            stroke-linejoin="round"
            opacity="0.1"
          ></path>
        </g>
      </svg>
    </main>

    <script src="./original.js"></script>
  </body>
</html>
